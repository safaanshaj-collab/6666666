<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" rx="16" fill="#141414"/>
  <!-- Tic-tac-toe grid lines -->
  <line x1="27" y1="12" x2="27" y2="68" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <line x1="53" y1="12" x2="53" y2="68" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="27" x2="68" y2="27" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="53" x2="68" y2="53" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <!-- X in top-left -->
  <line x1="16" y1="16" x2="24" y2="24" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="16" y2="24" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <!-- O in center -->
  <circle cx="40" cy="40" r="6" fill="none" stroke="#fb923c" stroke-width="2.5"/>
  <!-- X in bottom-right -->
  <line x1="56" y1="56" x2="64" y2="64" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="56" x2="56" y2="64" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
</svg>
